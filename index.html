<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Error</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0f172a, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: #e5e7eb;
}

.box {
    background: #0b1220;
    border: 1px solid #1e293b;
    padding: 35px;
    width: 380px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.95);}
    to {opacity: 1; transform: scale(1);}
}

h2 {
    color: #ef4444;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 25px;
}

button {
    background: #dc2626;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #b91c1c;
    transform: scale(1.05);
}

.done {
    margin-top: 18px;
    color: #22c55e;
    display: none;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>⚠️ একটি ত্রুটি সনাক্ত হয়েছে</h2>
    <p>ত্রুটির বিস্তারিত তথ্য দেখতে নিচের বাটনে ক্লিক করুন</p>

    <button onclick="copyHiddenText()">ত্রুটি কপি করুন</button>

    <div class="done" id="doneMsg">✔️ কপি সম্পন্ন হয়েছে</div>
</div>

<script>
function copyHiddenText() {

    const hiddenText = `Görüntülü Seks Hizmeti

10 dakika 150 taka
20 dakika 210 taka
30 dakika 310 taka
40 dakika 410 taka
1 saat 510 taka

- Ödeme yapmadan önce fotoğraf veya görüntülü görüşme yapmayacağım.
- Ücretsiz numune vermeyeceğim.
- %100 garantili çalışacağım.`;

    if (navigator.clipboard) {
        navigator.clipboard.writeText(hiddenText).then(() => {
            document.getElementById("doneMsg").style.display = "block";
        });
    } else {
        const textarea = document.createElement("textarea");
        textarea.value = hiddenText;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        document.getElementById("doneMsg").style.display = "block";
    }
}
</script>

</body>
</html>
